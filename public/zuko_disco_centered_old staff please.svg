<svg width="100%" viewBox="48 25 575 180" role="img" xmlns="http://www.w3.org/2000/svg" style="max-width: 690px; display: block; margin-inline: auto;">
  <title>Zuko - Disco Ball Text</title>
  <desc>Centered glittery disco-ball styled SVG text</desc>
  <defs>
    <style>
      @keyframes pulse {0%,100%{opacity:1}50%{opacity:.2}}
      @keyframes hueShift {0%{stop-color:#ffe066}25%{stop-color:#ff6eb4}50%{stop-color:#66eeff}75%{stop-color:#a0ff80}100%{stop-color:#ffe066}}
      @keyframes hueShift2 {0%{stop-color:#ff6eb4}25%{stop-color:#66eeff}50%{stop-color:#a0ff80}75%{stop-color:#ffe066}100%{stop-color:#ff6eb4}}
      @keyframes hueShift3 {0%{stop-color:#c8860a}25%{stop-color:#b0006a}50%{stop-color:#0090b0}75%{stop-color:#30a040}100%{stop-color:#c8860a}}
      @keyframes sparkle {0%{opacity:0;transform:scale(0)}45%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0)}}
      .t1 { animation: pulse 1.4s ease-in-out infinite; }
      .t2 { animation: pulse 1.4s ease-in-out infinite; animation-delay:.18s; }
      .t3 { animation: pulse 1.4s ease-in-out infinite; animation-delay:.36s; }
      .t4 { animation: pulse 1.4s ease-in-out infinite; animation-delay:.54s; }
      .t5 { animation: pulse 1.4s ease-in-out infinite; animation-delay:.72s; }
      .t6 { animation: pulse 1.4s ease-in-out infinite; animation-delay:.90s; }
      .sp { animation: sparkle 2.2s ease-in-out infinite; transform-origin: center; }
      .hs1 { animation: hueShift 4s linear infinite; }
      .hs2 { animation: hueShift2 4s linear infinite; }
      .hs3 { animation: hueShift3 4s linear infinite; }
    </style>

    <!-- Animated rainbow gradient -->
    <linearGradient id="rainbow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8c0" class="hs1"></stop>
      <stop offset="30%" stop-color="#ff6eb4" class="hs2"></stop>
      <stop offset="60%" stop-color="#66eeff" class="hs1"></stop>
      <stop offset="100%" stop-color="#3a1800"></stop>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff00aa" class="hs2"></stop>
      <stop offset="100%" stop-color="#00ccff" class="hs1"></stop>
    </linearGradient>

    <clipPath id="clipZ">
      <text x="340" y="170" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="160" font-weight="900" letter-spacing="-4">Zuko</text>
    </clipPath>

    <!-- Multi-color animated mosaic tiles -->
    <pattern id="tiles" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="13" height="13" fill="#7700aa" rx="1.5"></rect>
      <rect x="1" y="1" width="5" height="5" fill="#ffe066" rx="1" class="t1"></rect>
      <rect x="7" y="1" width="5" height="5" fill="#ff6eb4" rx="1" class="t2"></rect>
      <rect x="1" y="7" width="5" height="5" fill="#66eeff" rx="1" class="t3"></rect>
      <rect x="7" y="7" width="5" height="5" fill="#a0ff80" rx="1" class="t4"></rect>
    </pattern>
    <pattern id="tiles2" x="3" y="3" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="13" height="13" fill="#004488" rx="1.5"></rect>
      <rect x="1" y="1" width="5" height="5" fill="#ff4488" rx="1" class="t3"></rect>
      <rect x="7" y="1" width="5" height="5" fill="#ffcc00" rx="1" class="t4"></rect>
      <rect x="1" y="7" width="5" height="5" fill="#00ffcc" rx="1" class="t5"></rect>
      <rect x="7" y="7" width="5" height="5" fill="#cc88ff" rx="1" class="t6"></rect>
    </pattern>
    <mask id="imagine-text-gaps-4fgy2d" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="690" height="230" fill="white"></rect><rect x="184.90318711231654" y="11" width="314.1976834974421" height="199" fill="black" rx="2"></rect><rect x="180.90189920798804" y="7" width="314.1976834974421" height="199" fill="black" rx="2"></rect><rect x="180.90189920798804" y="7" width="314.1976834974421" height="199" fill="black" rx="2"></rect></mask></defs>

  <!-- Shadow -->
  <text x="344" y="174" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="160" font-weight="900" letter-spacing="-4" fill="#1a0033" opacity="0.6">Zuko</text>

  <!-- Mosaic layer 1 -->
  <rect x="0" y="0" width="680" height="220" fill="url(#tiles)" clip-path="url(#clipZ)"></rect>
  <!-- Mosaic layer 2 (offset for density) -->
  <rect x="0" y="0" width="680" height="220" fill="url(#tiles2)" clip-path="url(#clipZ)" opacity="0.5"></rect>

  <!-- Rainbow gradient overlay -->
  <text x="340" y="170" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="160" font-weight="900" letter-spacing="-4" fill="url(#rainbow)" opacity="0.45">Zuko</text>

  <!-- Animated stroke border -->
  <text x="340" y="170" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="160" font-weight="900" letter-spacing="-4" fill="none" stroke="url(#edge)" stroke-width="3.5" opacity="0.9">Zuko</text>

  <!-- Sparkles -->
  <g>
    <g class="sp" style="animation-delay:0s">
      <line x1="90" y1="40" x2="90" y2="62" stroke="#ffe066" stroke-width="2.5"></line><line x1="79" y1="51" x2="101" y2="51" stroke="#ffe066" stroke-width="2.5"></line>
      <line x1="82" y1="43" x2="98" y2="59" stroke="#fff0a0" stroke-width="1.5"></line><line x1="98" y1="43" x2="82" y2="59" stroke="#fff0a0" stroke-width="1.5"></line>
    </g>
    <g class="sp" style="animation-delay:0.5s">
      <line x1="600" y1="55" x2="600" y2="73" stroke="#ff6eb4" stroke-width="2"></line><line x1="591" y1="64" x2="609" y2="64" stroke="#ff6eb4" stroke-width="2"></line>
      <line x1="594" y1="58" x2="606" y2="70" stroke="#ffaadd" stroke-width="1.2"></line><line x1="606" y1="58" x2="594" y2="70" stroke="#ffaadd" stroke-width="1.2"></line>
    </g>
    <g class="sp" style="animation-delay:1s">
      <line x1="55" y1="130" x2="55" y2="150" stroke="#66eeff" stroke-width="2"></line><line x1="45" y1="140" x2="65" y2="140" stroke="#66eeff" stroke-width="2"></line>
      <line x1="48" y1="133" x2="62" y2="147" stroke="#aaffff" stroke-width="1.2"></line><line x1="62" y1="133" x2="48" y2="147" stroke="#aaffff" stroke-width="1.2"></line>
    </g>
    <g class="sp" style="animation-delay:1.5s">
      <line x1="635" y1="140" x2="635" y2="162" stroke="#a0ff80" stroke-width="2.5"></line><line x1="624" y1="151" x2="646" y2="151" stroke="#a0ff80" stroke-width="2.5"></line>
      <line x1="627" y1="143" x2="643" y2="159" stroke="#ccffaa" stroke-width="1.5"></line><line x1="643" y1="143" x2="627" y2="159" stroke="#ccffaa" stroke-width="1.5"></line>
    </g>
    <g class="sp" style="animation-delay:0.75s">
      <line x1="340" y1="14" x2="340" y2="30" stroke="#ffffff" stroke-width="2" mask="url(#imagine-text-gaps-4fgy2d)"></line><line x1="332" y1="22" x2="348" y2="22" stroke="#ffffff" stroke-width="2" mask="url(#imagine-text-gaps-4fgy2d)"></line>
    </g>
    <g class="sp" style="animation-delay:1.9s">
      <line x1="170" y1="28" x2="170" y2="42" stroke="#cc88ff" stroke-width="1.8"></line><line x1="163" y1="35" x2="177" y2="35" stroke="#cc88ff" stroke-width="1.8"></line>
    </g>
    <g class="sp" style="animation-delay:2.3s">
      <line x1="510" y1="20" x2="510" y2="36" stroke="#ffe066" stroke-width="1.8"></line><line x1="502" y1="28" x2="518" y2="28" stroke="#ffe066" stroke-width="1.8"></line>
    </g>
    <g class="sp" style="animation-delay:0.3s">
      <line x1="655" y1="90" x2="655" y2="104" stroke="#ff6eb4" stroke-width="1.5"></line><line x1="648" y1="97" x2="662" y2="97" stroke="#ff6eb4" stroke-width="1.5"></line>
    </g>
    <g class="sp" style="animation-delay:1.2s">
      <line x1="25" y1="80" x2="25" y2="96" stroke="#66eeff" stroke-width="1.5"></line><line x1="17" y1="88" x2="33" y2="88" stroke="#66eeff" stroke-width="1.5"></line>
    </g>
  </g>
</svg>